<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進口車成本計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .input-group:focus-within label { color: #2563eb; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .sticky-result { position: sticky; top: 1rem; }
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- Header -->
    <div class="text-center mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-slate-800 mb-2 flex justify-center items-center gap-2">
            <i data-lucide="shield-check" class="text-blue-600"></i> 進口車成本計算機
        </h1>
        <div class="flex flex-col items-center gap-1">
            <p class="text-slate-500 text-xs md:text-sm">成本即時試算系統</p>
            <div id="apiStatus" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-200 text-slate-500 flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> 正在獲取即時匯率...
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
        <!-- Input Section -->
        <div class="lg:col-span-7 space-y-4 md:space-y-6">
            <!-- 基礎設定卡片 -->
            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-md md:text-lg font-bold text-slate-700 mb-4 flex items-center gap-2 border-b pb-2">
                    <i data-lucide="settings" class="w-5 h-5 text-blue-500"></i> 進口參數設定
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Currency Select -->
                    <div class="input-group">
                        <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">購車幣別</label>
                        <select id="currency" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all cursor-pointer">
                            <option value="JPY">日圓 (JPY)</option>
                            <option value="KRW">韓元 (KRW)</option>
                            <option value="USD" selected>美金 (USD)</option>
                            <option value="CAD">加幣 (CAD)</option>
                        </select>
                    </div>

                    <!-- Exchange Rate -->
                    <div class="input-group">
                        <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">匯率 (對台幣)</label>
                        <div class="relative">
                            <input type="number" id="exchangeRate" value="32.55" step="0.0001" inputmode="decimal" class="calc-trigger num-only w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono">
                            <div id="rateUpdateLabel" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-slate-400 font-bold hidden md:block">
                                API
                            </div>
                        </div>
                    </div>

                    <!-- Displacement Select -->
                    <div class="input-group">
                        <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">引擎排氣量級距</label>
                        <select id="displacementGrade" class="calc-trigger w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all cursor-pointer">
                            <option value="2000">2000cc 以下 (貨物稅 25%)</option>
                            <option value="2001">2001cc 以上 (貨物稅 30%)</option>
                        </select>
                    </div>

                    <!-- Shipping -->
                    <div class="input-group">
                        <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">運費預估 (USD)</label>
                        <input type="number" id="shippingUSD" value="1200" inputmode="decimal" class="calc-trigger num-only w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono">
                    </div>
                </div>
            </div>

            <!-- 固定成本卡片 -->
            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-md md:text-lg font-bold text-slate-700 mb-4 flex items-center gap-2 border-b pb-2">
                    <i data-lucide="anchor" class="w-5 h-5 text-blue-500"></i> 台灣固定成本 (TWD)
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="input-group">
                        <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">驗車費預估 (含報告授權)</label>
                        <input type="number" id="inspectionFee" value="0" inputmode="decimal" class="calc-trigger num-only w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono">
                    </div>
                    <div class="input-group">
                        <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">報關/雜項/保險</label>
                        <input type="number" id="miscFee" value="0" inputmode="decimal" class="calc-trigger num-only w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono">
                    </div>
                </div>
            </div>

            <!-- 核心輸入：國外車價 -->
            <div class="bg-blue-50 p-5 md:p-6 rounded-2xl shadow-md border-2 border-blue-200 relative overflow-hidden text-center lg:text-left">
                <div class="absolute right-0 top-0 opacity-10 -mr-4 -mt-4">
                    <i data-lucide="banknote" class="w-24 h-24 text-blue-600"></i>
                </div>
                <h2 class="text-md md:text-lg font-bold text-blue-800 mb-4 flex items-center justify-center lg:justify-start gap-2">
                    <i data-lucide="coins" class="w-5 h-5"></i> 國外購車價 (FOB)
                </h2>
                <div class="relative max-w-md mx-auto lg:mx-0">
                    <span id="priceLabel" class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-500 font-black text-sm">USD</span>
                    <input type="number" id="fobPrice" placeholder="輸入金額..." inputmode="decimal" class="calc-trigger num-only w-full bg-white border-2 border-blue-300 rounded-xl p-4 pl-16 focus:border-blue-500 outline-none transition-all text-2xl font-mono text-blue-900 shadow-inner">
                </div>
                <!-- 中文單位備註 -->
                <div id="chinesePriceNote" class="mt-2 text-blue-700 text-sm font-bold min-h-[1.25rem] text-right max-w-md mx-auto lg:mx-0"></div>
            </div>
        </div>

        <!-- Result Section -->
        <div class="lg:col-span-5 relative">
            <div id="resultCard" class="bg-slate-900 text-white p-6 md:p-8 rounded-3xl shadow-2xl sticky-result flex flex-col transition-all duration-300 border border-slate-700">
                <div class="flex justify-between items-start mb-1">
                    <h3 class="text-slate-400 text-xs md:text-sm font-medium uppercase tracking-wider">進口預估總成本</h3>
                    <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded-full border border-blue-500/30">即時更新</span>
                </div>
                
                <div id="totalCost" class="text-3xl md:text-4xl font-bold text-blue-400 mb-1 font-mono tracking-tight text-center lg:text-left">NT$ 0</div>
                <div id="totalChineseNote" class="text-blue-300/60 text-xs mb-6 font-medium text-center lg:text-left">約 0 元</div>

                <div class="space-y-3 md:space-y-4 flex-grow text-sm">
                    <div class="flex justify-between border-b border-white/10 pb-2">
                        <span class="text-slate-400">原始車價 (折合台幣)</span>
                        <span id="res_fobTwd" class="font-medium text-slate-200">NT$ 0</span>
                    </div>
                    <div class="flex justify-between border-b border-white/10 pb-2">
                        <span class="text-slate-400">到岸價格 (CIF)</span>
                        <span id="res_cif" class="font-medium text-slate-200">NT$ 0</span>
                    </div>
                    
                    <div class="py-1">
                        <p class="text-[10px] text-blue-400 font-bold mb-2 uppercase tracking-widest">稅金明細</p>
                        <div class="space-y-2 pl-3 border-l-2 border-blue-500/30 text-xs md:text-sm font-mono">
                            <div class="flex justify-between">
                                <span class="text-slate-400">進口關稅 (17.5%)</span>
                                <span id="res_tariff" class="text-slate-200">0</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-400">貨物稅 (<span id="commodityLabel">25</span>%)</span>
                                <span id="res_commodity" class="text-slate-200">0</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-400">營業稅 (5%)</span>
                                <span id="res_vat" class="text-slate-200">0</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-400">推廣貿易費 (0.04%)</span>
                                <span id="res_tradeFee" class="text-slate-200">0</span>
                            </div>
                            <div id="luxuryTaxRow" class="flex justify-between text-yellow-400 hidden animate-pulse">
                                <span class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> 奢侈稅 (10%)</span>
                                <span id="res_luxury">0</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-between border-t border-white/10 pt-4 mt-2">
                        <span class="text-slate-400">稅金總計</span>
                        <span id="res_totalTax" class="font-bold text-red-400 text-lg">NT$ 0</span>
                    </div>
                </div>

                
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    const currencyInput = document.getElementById('currency');
    const exchangeRateInput = document.getElementById('exchangeRate');
    const priceLabel = document.getElementById('priceLabel');
    const fobPriceInput = document.getElementById('fobPrice');
    const chinesePriceNote = document.getElementById('chinesePriceNote');
    const apiStatus = document.getElementById('apiStatus');

    // 預設匯率
    let currentRates = {
        'JPY': 0.2125,
        'KRW': 0.0242,
        'USD': 32.55,
        'CAD': 23.85
    };

    // 獲取即時匯率
    async function fetchLiveRates() {
        try {
            apiStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span> 正在連接匯率伺服器...`;
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            
            const twdBase = data.rates.TWD;
            currentRates = {
                'USD': parseFloat(twdBase.toFixed(4)),
                'JPY': parseFloat((twdBase / data.rates.JPY).toFixed(4)),
                'KRW': parseFloat((twdBase / data.rates.KRW).toFixed(4)),
                'CAD': parseFloat((twdBase / data.rates.CAD).toFixed(4))
            };

            apiStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> 即時匯率已同步 (${new Date().toLocaleTimeString()})`;
            apiStatus.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 flex items-center gap-1";
            
            updateRateDisplay();
        } catch (error) {
            apiStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> 匯率連線失敗 (使用離線預設值)`;
            apiStatus.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 flex items-center gap-1";
        }
    }

    function updateRateDisplay() {
        const curr = currencyInput.value;
        exchangeRateInput.value = currentRates[curr];
        calculate();
    }

    function setupNumericConstraints() {
        const numInputs = document.querySelectorAll('.num-only');
        numInputs.forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (['e', 'E', '+', '-'].includes(e.key)) e.preventDefault();
            });
            input.addEventListener('input', () => {
                if (input.value < 0) input.value = 0;
            });
        });
    }

    function toChineseUnits(num) {
        if (!num || num <= 0) return "";
        if (num >= 100000000) {
            const yi = Math.floor(num / 100000000);
            const wan = Math.round((num % 100000000) / 10000);
            return `約 ${yi} 億 ${wan > 0 ? wan + ' 萬' : ''}`;
        } else if (num >= 10000) {
            return `約 ${Math.round(num / 10000).toLocaleString()} 萬`;
        }
        return `約 ${Math.round(num).toLocaleString()} 元`;
    }

    currencyInput.addEventListener('change', () => {
        priceLabel.textContent = currencyInput.value;
        updateRateDisplay();
        updateChineseNote();
    });

    function updateChineseNote() {
        const val = parseFloat(fobPriceInput.value);
        chinesePriceNote.textContent = val ? `${toChineseUnits(val)} ${currencyInput.value}` : "";
    }

    function formatNumber(num) {
        return Math.round(num).toLocaleString('zh-TW');
    }

    function calculate() {
        const exchangeRate = parseFloat(exchangeRateInput.value) || 0;
        const fobPrice = parseFloat(fobPriceInput.value) || 0;
        const displacementGrade = parseInt(document.getElementById('displacementGrade').value) || 0;
        const shippingUSD = parseFloat(document.getElementById('shippingUSD').value) || 0;
        const inspectionFee = parseFloat(document.getElementById('inspectionFee').value) || 0;
        const miscFee = parseFloat(document.getElementById('miscFee').value) || 0;

        if (fobPrice <= 0) {
            document.getElementById('resultCard').style.opacity = '0.7';
            return;
        }
        document.getElementById('resultCard').style.opacity = '1';

        const fobTwd = fobPrice * exchangeRate;
        const shippingTwd = shippingUSD * (currentRates['USD'] || 32.5); 
        const insurance = fobTwd * 0.005;
        const cif = fobTwd + shippingTwd + insurance;

        const tariff = cif * 0.175;
        const isHighDisplacement = displacementGrade > 2000;
        const commodityTaxRate = isHighDisplacement ? 0.30 : 0.25;
        const commodityTax = (cif + tariff) * commodityTaxRate;
        document.getElementById('commodityLabel').textContent = isHighDisplacement ? '30' : '25';

        const vat = (cif + tariff + commodityTax) * 0.05;
        const tradeFee = cif * 0.0004;

        const taxBeforeLuxury = tariff + commodityTax + vat + tradeFee;
        const priceForLuxuryCheck = cif + taxBeforeLuxury;
        let luxuryTax = 0;
        if (priceForLuxuryCheck > 3000000) {
            luxuryTax = priceForLuxuryCheck * 0.10;
            document.getElementById('luxuryTaxRow').classList.remove('hidden');
        } else {
            document.getElementById('luxuryTaxRow').classList.add('hidden');
        }

        const totalTax = taxBeforeLuxury + luxuryTax;
        const finalTotal = cif + totalTax + inspectionFee + miscFee;

        document.getElementById('totalCost').textContent = `NT$ ${formatNumber(finalTotal)}`;
        document.getElementById('totalChineseNote').textContent = toChineseUnits(finalTotal);
        document.getElementById('res_fobTwd').textContent = `NT$ ${formatNumber(fobTwd)}`;
        document.getElementById('res_cif').textContent = `NT$ ${formatNumber(cif)}`;
        document.getElementById('res_tariff').textContent = formatNumber(tariff);
        document.getElementById('res_commodity').textContent = formatNumber(commodityTax);
        document.getElementById('res_vat').textContent = formatNumber(vat);
        document.getElementById('res_tradeFee').textContent = formatNumber(tradeFee);
        document.getElementById('res_luxury').textContent = formatNumber(luxuryTax);
        document.getElementById('res_totalTax').textContent = `NT$ ${formatNumber(totalTax)}`;
    }

    document.querySelectorAll('.calc-trigger').forEach(el => {
        el.addEventListener('input', () => {
            if (el.id === 'fobPrice') updateChineseNote();
            calculate();
        });
        if (el.tagName === 'SELECT') {
            el.addEventListener('change', calculate);
        }
    });

    setupNumericConstraints();
    fetchLiveRates();
    updateChineseNote();
    calculate();
</script>

</body>
</html>
